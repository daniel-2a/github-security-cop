name: Vulnerable Workflow - Simple

on:
  pull_request_target:
    types: [opened]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: I will not tell you my secret
        run: echo "The secret is ... han-shot-first"

  greet-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Greet PR - Variant 1
        run: echo "Hello PR ... ${{ github.event.pull_request.title }}"

      - name: Greet PR - Variant 2
        uses: ./.github/actions/greet-pr
        with:
          hello: ${{ github.event.pull_request.title }}
